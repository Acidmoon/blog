<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上传管理 · 图书馆 · 水浇岭</title>
<link rel="stylesheet" href="/library/static/style.css?v=2">
</head>
<body>

<nav class="library-nav">
  <a href="/library/" class="nav-back-link">← 返回书架</a>
  <span class="nav-count">📤 图书管理</span>
  <span></span>
</nav>

<main class="admin-page">
  <section class="upload-form">
    <h2>上传新书</h2>
    <form id="uploadForm">
      <div class="form-group">
        <label for="title">书名</label>
        <input type="text" id="title" name="title" placeholder="留空则自动从 PDF/EPUB 元数据提取">
        <span class="form-hint">PDF/EPUB 可自动识别，手动填写会覆盖自动识别结果</span>
      </div>
      <div class="form-group">
        <label for="author">作者</label>
        <input type="text" id="author" name="author" placeholder="留空则自动从 PDF/EPUB 元数据提取">
      </div>
      <div class="form-group">
        <label for="description">简介</label>
        <textarea id="description" name="description" rows="3" placeholder="图书简介…"></textarea>
      </div>
      <div class="form-group">
        <label for="coverFile">封面图片（可选）</label>
        <input type="file" id="coverFile" name="cover" accept="image/*">
      </div>
      <div class="form-group">
        <label for="bookFile">图书文件 *</label>
        <input type="file" id="bookFile" name="file" required accept=".pdf,.epub,.mobi,.txt,.md,.html">
        <span class="form-hint">支持 PDF / EPUB / MOBI / TXT / Markdown / HTML，最大 100MB</span>
      </div>
      <div class="upload-progress" id="uploadProgress" hidden>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <span id="progressText">上传中…</span>
      </div>
      <button type="submit" class="btn btn-primary">📤 上传</button>
    </form>
  </section>

  <section class="book-list-admin">
    <h2>已上传图书</h2>
    <div id="adminBookList" class="admin-book-list">
      <div class="shelf-loading">加载中…</div>
    </div>
  </section>
</main>

<script src="/library/static/app.js?v=2"></script>
<script>
loadAdminBookList();
document.getElementById('uploadForm').addEventListener('submit', uploadBook);
</script>
</body>
</html>
