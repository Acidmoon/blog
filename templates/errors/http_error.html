{% extends "base.html" %}

{% block title %}{{ status_code }} · {{ config.SITE_TITLE }}{% endblock %}
{% block description %}{{ message }}{% endblock %}

{% block content %}
<main class="container">
  <section class="empty-state" role="alert" aria-labelledby="error-title">
    <div class="empty-state-icon" aria-hidden="true">{{ status_code }}</div>
    <h1 id="error-title" class="serif">{{ title }}</h1>
    <p>{{ message }}</p>
    <p><a class="btn btn-primary" href="{{ url_for('public.index') }}">返回首页</a></p>
  </section>
</main>
{% endblock %}
