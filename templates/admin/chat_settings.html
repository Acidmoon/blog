{% extends "base.html" %}
{% block title %}AI 对话设置 · {{ config.SITE_TITLE }}{% endblock %}
{% block content %}
<main class="admin-page">
  <div class="admin-header">
    <h2 class="serif">AI 对话设置</h2>
    <a href="/chat" class="btn btn-secondary">查看公开页</a>
  </div>

  <form method="post" class="admin-form chat-settings-form">
    <div class="form-group chat-toggle-row">
      <label class="chat-settings-toggle">
        <input type="checkbox" name="enabled" value="1" {% if settings.enabled %}checked{% endif %}>
        <span>启用公开 AI 对话</span>
      </label>
      <p class="form-help">启用后，顶部导航会显示“AI 对话”，访客登录后可使用。</p>
    </div>

    <div class="form-group">
      <label for="api_base">API Base</label>
      <input type="url" id="api_base" name="api_base" value="{{ settings.api_base }}" placeholder="https://www.waterhill.cyou/v1" required>
    </div>

    <div class="form-group">
      <label for="api_key">API Key</label>
      <input type="password" id="api_key" name="api_key" placeholder="{% if settings.api_key_configured %}已配置，留空则不修改{% else %}请输入 API Key{% endif %}">
      <p class="form-help">{% if settings.api_key_configured %}当前已配置 API Key。{% else %}当前未配置 API Key。{% endif %}</p>
    </div>

    <div class="form-group">
      <label for="model">模型名</label>
      <input type="text" id="model" name="model" value="{{ settings.model }}" placeholder="gpt-5.5" required>
    </div>

    <div class="form-group">
      <label for="system_prompt">System Prompt</label>
      <textarea id="system_prompt" name="system_prompt" rows="5" required>{{ settings.system_prompt }}</textarea>
    </div>

    <div class="chat-settings-grid">
      <div class="form-group">
        <label for="rate_limit_minute">每 IP 每分钟限制</label>
        <input type="number" id="rate_limit_minute" name="rate_limit_minute" value="{{ settings.rate_limit_minute }}" min="1" step="1" required>
      </div>
      <div class="form-group">
        <label for="rate_limit_day">每 IP 每日限制</label>
        <input type="number" id="rate_limit_day" name="rate_limit_day" value="{{ settings.rate_limit_day }}" min="1" step="1" required>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">保存设置</button>
      <a href="/admin" class="btn btn-secondary">返回后台</a>
    </div>
  </form>
</main>
{% endblock %}
