{% extends "base.html" %}
{% block title %}访客登录 · {{ config.SITE_TITLE }}{% endblock %}
{% block description %}登录后访问博客内容和 AI 对话{% endblock %}

{% block content %}
<main class="login-page visitor-login-page">
  <form method="post" class="login-card visitor-login-card">
    <h1 class="serif">访客登录</h1>
    <p class="login-subtitle">输入用户名和密码进入博客。</p>
    {% if error %}
    <div class="flash error">{{ error }}</div>
    {% endif %}
    <input type="hidden" name="next" value="{{ next_url }}">
    <div class="form-group">
      <label for="username">用户名</label>
      <input id="username" name="username" autocomplete="username" maxlength="12" pattern="[A-Za-z0-9]{1,12}" required>
    </div>
    <div class="form-group">
      <label for="password">密码</label>
      <input id="password" name="password" type="password" autocomplete="current-password" maxlength="12" pattern="[A-Za-z0-9]{1,12}" required>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">登录</button>
      <a href="/admin/login" class="btn btn-secondary">管理员入口</a>
    </div>
  </form>
</main>
{% endblock %}

{% block footer %}{% endblock %}
