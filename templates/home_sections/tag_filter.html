{% if all_tags %}
<div class="tag-filter-section" id="tag-filter" data-home-section="tag_filter">
  <div class="tag-filter-label">标签</div>
  <div class="tag-filter">
    <a href="/" class="tag {% if not current_tag %}active{% endif %}">全部</a>
    {% for tag in all_tags %}
    <a href="/?tag={{ tag|urlencode }}" class="tag {% if current_tag == tag %}active{% endif %}">{{ tag }}</a>
    {% endfor %}
  </div>
</div>
{% endif %}
