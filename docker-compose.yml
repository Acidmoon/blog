name: waterhill-blog

services:
  blog:
    image: waterhill-blog:local
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: waterhill-blog
    restart: unless-stopped
    init: true
    ports:
      - "${BLOG_PORT:-8082}:8082"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      PORT: 8082
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      BLOG_SECRET_KEY: ${BLOG_SECRET_KEY:?set BLOG_SECRET_KEY in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-Acidmoon}
      COOKIE_SECURE: ${COOKIE_SECURE:-1}
      ADMIN_SESSION_MAX_AGE_SECONDS: ${ADMIN_SESSION_MAX_AGE_SECONDS:-43200}
      ARTICLES_DIR: /app/data/articles
      ASSET_VERSION: ${ASSET_VERSION:-2026-06-17-architecture-refactor}
      AI_POLISH_TIMEOUT: ${AI_POLISH_TIMEOUT:-60}
      AI_POLISH_API_BASE: ${AI_POLISH_API_BASE:-https://www.waterhill.cyou/v1}
      AI_POLISH_API_KEY: ${AI_POLISH_API_KEY:-}
      AI_POLISH_MODEL: ${AI_POLISH_MODEL:-gpt-5.5}
      AI_POLISH_MODELS: ${AI_POLISH_MODELS:-gpt-5.5,gpt-5.4,gpt-4.1}
      AI_POLISH_MIMO_API_BASE: ${AI_POLISH_MIMO_API_BASE:-https://www.waterhill.cyou/v1}
      AI_POLISH_MIMO_API_KEY: ${AI_POLISH_MIMO_API_KEY:-}
      AI_POLISH_MIMO_MODEL: ${AI_POLISH_MIMO_MODEL:-mimo-v2.5-pro}
      AI_POLISH_MIMO_MODELS: ${AI_POLISH_MIMO_MODELS:-mimo-v2.5-pro}
      AI_POLISH_DEEPSEEK_API_BASE: ${AI_POLISH_DEEPSEEK_API_BASE:-https://api.deepseek.com/v1}
      AI_POLISH_DEEPSEEK_API_KEY: ${AI_POLISH_DEEPSEEK_API_KEY:-}
      AI_POLISH_DEEPSEEK_MODEL: ${AI_POLISH_DEEPSEEK_MODEL:-deepseek-v4-flash}
      AI_POLISH_DEEPSEEK_MODELS: ${AI_POLISH_DEEPSEEK_MODELS:-deepseek-v4-pro,deepseek-v4-flash}
    volumes:
      - ./data:/app/data
      - ./data/images:/app/static/images
      - ./home_layout.json:/app/home_layout.json
      - /etc/localtime:/etc/localtime:ro
