version: '3'
services:
  blog:
    build: .
    container_name: waterhill-blog
    restart: always
    command: ["gunicorn", "-w", "2", "-t", "120", "-b", "0.0.0.0:8082", "app:app"]
    ports:
      - "127.0.0.1:8082:8082"
    environment:
      - TZ=Asia/Shanghai
      - BLOG_SECRET_KEY=${BLOG_SECRET_KEY:-change-me}
      - ADMIN_PASSWORD=132456758Dzy
      - AI_POLISH_API_BASE=https://www.waterhill.cyou/v1
      - AI_POLISH_API_KEY=${AI_POLISH_API_KEY:-}
      - AI_POLISH_MODEL=gpt-5.5
      - AI_POLISH_MODELS=gpt-5.5,gpt-5.4,gpt-4.1
      - AI_POLISH_MIMO_API_BASE=https://www.waterhill.cyou/v1
      - AI_POLISH_MIMO_API_KEY=${AI_POLISH_MIMO_API_KEY:-}
      - AI_POLISH_MIMO_MODEL=mimo-v2.5-pro
      - AI_POLISH_MIMO_MODELS=mimo-v2.5-pro
      - AI_POLISH_DEEPSEEK_API_BASE=https://api.deepseek.com/v1
      - AI_POLISH_DEEPSEEK_API_KEY=${AI_POLISH_DEEPSEEK_API_KEY:-}
      - AI_POLISH_DEEPSEEK_MODEL=deepseek-v4-pro
      - AI_POLISH_DEEPSEEK_MODELS=deepseek-v4-pro,deepseek-v4-flash
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /root/blog/data/articles:/app/articles
      - /root/blog/data/images:/app/static/images
      - /root/blog/data:/app/data
      - /root/blog/templates:/app/templates
      - /root/blog/static/css:/app/static/css
      - /root/blog/static/js:/app/static/js
      - /root/blog/home_layout.json:/app/home_layout.json
      - /root/blog/config.py:/app/config.py
